name: Bug report
description: Report a bug or unexpected behavior in DeepResearch on LangGraph.
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce. Include a curl command or frontend flow if possible.
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Backend logs
      description: Paste the relevant loguru output (set LOG_LEVEL=DEBUG for more detail).

  - type: input
    id: env
    attributes:
      label: Environment
      description: OS, Python version (`uv run python --version`), and the search backend in use.
      placeholder: macOS 14 / Python 3.12 / SEARCH_API=duckduckgo

  - type: dropdown
    id: search_api
    attributes:
      label: Search backend
      options:
        - duckduckgo
        - tavily
        - perplexity
        - searxng
        - advanced
    validations:
      required: true
