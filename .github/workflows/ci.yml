name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Lint (advisory)
    runs-on: ubuntu-latest
    defaults:
      working-directory: backend
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Ruff (full project config)
        # Advisory only: legacy D-series docstring warnings are tracked in a
        # separate cleanup PR. Switching this to blocking is a roadmap item.
        run: uv run ruff check src tests || true

  backend-test:
    name: Test (backend)
    runs-on: ubuntu-latest
    defaults:
      working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Pytest
        run: uv run pytest
