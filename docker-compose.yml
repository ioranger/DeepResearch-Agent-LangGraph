name: helloagents-deepresearch

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deepresearch-backend
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./backend/notes:/app/backend/notes
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    image: node:20-alpine
    container_name: deepresearch-frontend
    working_dir: /app
    command: sh -c "npm install --no-audit --no-fund && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      - VITE_API_BASE_URL=http://backend:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      backend:
        condition: service_healthy

  # Opt-in: bring up local Ollama alongside the stack.
  # Usage: docker compose --profile ollama up --build
  ollama:
    image: ollama/ollama:latest
    container_name: deepresearch-ollama
    profiles: ["ollama"]
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
